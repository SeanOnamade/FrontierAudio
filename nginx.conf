# JARVIS Load Balancer Configuration - Nginx
# High-performance load balancing with caching and compression

# Upstream servers - multiple JARVIS instances
upstream jarvis_backend {
    # Load balancing method
    least_conn;  # Route to server with least active connections
    
    # Backend servers
    server 127.0.0.1:5001 max_fails=3 fail_timeout=30s weight=1;
    server 127.0.0.1:5002 max_fails=3 fail_timeout=30s weight=1;
    server 127.0.0.1:5003 max_fails=3 fail_timeout=30s weight=1;
    
    # Health checks
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=query_limit:10m rate=5r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Caching zones
proxy_cache_path /var/cache/nginx/jarvis levels=1:2 keys_zone=jarvis_cache:100m 
                 max_size=1g inactive=24h use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name jarvis.airport.local;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jarvis.airport.local;
    
    # SSL Configuration
    ssl_certificate /etc/ssl/certs/jarvis.crt;
    ssl_certificate_key /etc/ssl/private/jarvis.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    
    # Connection and request limits
    limit_conn conn_limit 20;
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    
    # Logging
    access_log /var/log/nginx/jarvis_access.log combined;
    error_log /var/log/nginx/jarvis_error.log warn;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        text/plain
        text/css
        text/xml
        text/javascript;
    
    # Brotli compression (if enabled)
    brotli on;
    brotli_comp_level 6;
    brotli_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml;
    
    # Static assets with CDN-like caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Enable compression for static assets
        gzip_static on;
        
        proxy_pass http://jarvis_backend;
        proxy_cache jarvis_cache;
        proxy_cache_valid 200 1d;
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        
        # Add cache status header
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # API endpoints with smart caching
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        # Proxy configuration
        proxy_pass http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Health check endpoint - no caching
        location = /api/health {
            proxy_pass http://jarvis_backend;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        
        # Query endpoint with specific rate limiting
        location = /api/query {
            limit_req zone=query_limit burst=10 nodelay;
            
            proxy_pass http://jarvis_backend;
            
            # Cache successful responses for short periods
            proxy_cache jarvis_cache;
            proxy_cache_methods GET POST;
            proxy_cache_valid 200 5m;  # Cache successful queries for 5 minutes
            proxy_cache_valid 404 1m;  # Cache 404s for 1 minute
            proxy_cache_key "$scheme$request_method$host$request_uri$request_body";
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            
            add_header X-Cache-Status $upstream_cache_status;
        }
        
        # Analytics endpoints with longer caching
        location ~* /api/analytics/ {
            proxy_pass http://jarvis_backend;
            
            proxy_cache jarvis_cache;
            proxy_cache_valid 200 15m;  # Cache analytics for 15 minutes
            proxy_cache_key "$scheme$request_method$host$request_uri$args";
            
            add_header X-Cache-Status $upstream_cache_status;
        }
        
        # Default API caching
        proxy_cache jarvis_cache;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 404 1m;
        proxy_cache_key "$scheme$request_method$host$request_uri$args";
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # Main application
    location / {
        proxy_pass http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Cache HTML pages briefly
        proxy_cache jarvis_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        
        add_header X-Cache-Status $upstream_cache_status;
        
        # Fallback to maintenance page if all backends are down
        error_page 502 503 504 /maintenance.html;
    }
    
    # Maintenance page
    location = /maintenance.html {
        root /var/www/jarvis;
        internal;
    }
    
    # Cache purge endpoint (admin only)
    location = /cache/purge {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        
        proxy_cache_purge jarvis_cache $scheme$request_method$host$request_uri;
    }
    
    # Monitoring endpoint for load balancer health
    location = /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }
}

# Upstream health check configuration
upstream_conf {
    server {
        listen 8080;
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
