# JARVIS High-Performance Deployment
# Docker Compose configuration for scalable, load-balanced deployment

version: '3.8'

services:
  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: jarvis_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - jarvis_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # JARVIS Application Instances
  jarvis_app_1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis_app_1
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_PATH=/app/data/united_airlines_normalized.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FLASK_ENV=production
    volumes:
      - ./united_airlines_normalized.db:/app/data/united_airlines_normalized.db:ro
      - app_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jarvis_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  jarvis_app_2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis_app_2
    restart: unless-stopped
    ports:
      - "5002:5001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_PATH=/app/data/united_airlines_normalized.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FLASK_ENV=production
    volumes:
      - ./united_airlines_normalized.db:/app/data/united_airlines_normalized.db:ro
      - app_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jarvis_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  jarvis_app_3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis_app_3
    restart: unless-stopped
    ports:
      - "5003:5001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_PATH=/app/data/united_airlines_normalized.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FLASK_ENV=production
    volumes:
      - ./united_airlines_normalized.db:/app/data/united_airlines_normalized.db:ro
      - app_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jarvis_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: jarvis_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/ssl:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      - jarvis_app_1
      - jarvis_app_2
      - jarvis_app_3
    networks:
      - jarvis_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx_status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: jarvis_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - jarvis_network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: jarvis_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - jarvis_network

  # Log aggregation - ELK Stack (optional)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: jarvis_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - jarvis_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: jarvis_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - jarvis_network

  # Performance testing tool
  performance_tester:
    image: williamyeh/wrk
    container_name: jarvis_performance_test
    networks:
      - jarvis_network
    profiles:
      - testing
    command: >
      sh -c "
        echo 'Starting performance test...' &&
        wrk -t12 -c400 -d30s --timeout 30s http://nginx/api/health &&
        echo 'Health check test completed' &&
        wrk -t8 -c200 -d60s --timeout 30s -s /scripts/query_test.lua http://nginx/api/query &&
        echo 'Query performance test completed'
      "
    volumes:
      - ./performance_tests:/scripts

volumes:
  redis_data:
    driver: local
  app_logs:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  jarvis_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
